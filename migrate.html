<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="robots" content="noindex, nofollow" />
<title>Migrate products → Supabase</title>
<style>
  body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:0 20px;line-height:1.6;color:#1e1e2a;}
  button{background:#1e1e2a;color:#fff;border:none;padding:14px 28px;border-radius:40px;font-size:1rem;cursor:pointer;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  #log{margin-top:20px;padding:16px;background:#f5f2ed;border-radius:12px;white-space:pre-wrap;font-family:monospace;font-size:.85rem;min-height:40px;}
  .warn{background:#fff4e0;border:1px solid #e0c68a;padding:14px;border-radius:10px;margin-bottom:20px;}
</style>
</head>
<body>
  <h1>One-time product migration</h1>
  <div class="warn">
    This copies every product currently in <code>products.js</code> into your
    Supabase <code>products</code> table. Run this <strong>once</strong>,
    after you've set up <code>supabase-config.js</code>. Running it twice will
    duplicate everything — check your Supabase table editor first if you're unsure.
  </div>
  <button id="runBtn">Migrate products.js → Supabase</button>
  <div id="log">Waiting…</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="products-service.js"></script>
  <script src="products.js"></script>
  <script>
    const btn = document.getElementById('runBtn');
    const log = document.getElementById('log');

    if (typeof SUPABASE_CONFIGURED !== 'undefined' && !SUPABASE_CONFIGURED) {
      log.textContent = 'supabase-config.js is not filled in yet. Add your project URL and key first, then reload this page.';
      btn.disabled = true;
    } else if (!supabaseClient) {
      log.textContent = 'Error: supabaseClient is not initialized. Check your Supabase credentials and make sure the Supabase library loaded correctly.';
      btn.disabled = true;
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      log.textContent = `Uploading ${PRODUCTS.length} products…`;
      try {
        const count = await ProductService.bulkImport(PRODUCTS);
        log.textContent = `Done! ${count} products uploaded to Supabase.\n\nYou can now delete this file (migrate.html) and open admin.html to manage your store.`;
      } catch (err) {
        log.textContent = 'Error: ' + err.message + '\n\nCheck your Supabase table exists with the right columns and that Row Level Security allows inserts (see SETUP-GUIDE.md).';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
